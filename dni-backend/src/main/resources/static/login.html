<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | {SHG}</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark-theme');
        }
    </script>
    <style>
        .login-wrapper-container {
            width: 100%;
            max-width: 420px;
            z-index: 10;
            margin: 0 auto;
        }
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .login-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0;
            color: var(--text-primary);
        }
        .login-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }
        .error-msg, .logout-msg {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .logout-msg {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        body.has-error .error-msg { display: flex; }
        body.has-logout .logout-msg { display: flex; }
        
        .theme-toggle-login {
            position: absolute;
            top: 2rem;
            right: 2rem;
            z-index: 20;
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="btn-icon-header theme-toggle-login" title="Cambiar Tema">
        <i class="ph ph-moon"></i>
    </button>
    <div class="login-wrapper-container">
        <div class="glass-panel">
            <div class="login-header">
                <div class="shg-logo">
                    {SHG}
                </div>
                <h1>Acceso al Sistema</h1>
                <p>Ingresa tus credenciales para continuar</p>
            </div>

            <div class="error-msg">
                <i class="ph ph-warning-circle"></i> Usuario o contraseña incorrectos.
            </div>
            
            <div class="logout-msg">
                <i class="ph ph-check-circle"></i> Sesión cerrada exitosamente.
            </div>

            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="username">Usuario</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user"></i>
                        <input type="text" id="username" name="username" placeholder="Tu usuario admin" required autofocus autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key"></i>
                        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1.5rem;">
                    Iniciar Sesión
                    <i class="ph ph-arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('error')) {
            document.body.classList.add('has-error');
        }
        if (urlParams.has('logout')) {
            document.body.classList.add('has-logout');
        }
        
        const themeToggleBtn = document.getElementById('themeToggle');
        if (themeToggleBtn) {
            const themeIcon = themeToggleBtn.querySelector('i');
            if (document.documentElement.classList.contains('dark-theme')) {
                themeIcon.className = 'ph ph-sun';
            }
            themeToggleBtn.addEventListener('click', () => {
                document.documentElement.classList.toggle('dark-theme');
                if (document.documentElement.classList.contains('dark-theme')) {
                    localStorage.setItem('theme', 'dark');
                    themeIcon.className = 'ph ph-sun';
                } else {
                    localStorage.setItem('theme', 'light');
                    themeIcon.className = 'ph ph-moon';
                }
            });
        }
    </script>
</body>
</html>
